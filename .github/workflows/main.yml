name: workflow

on:
  push:
    branches:
      - main
    paths-ignore:
      - 'README.md'
      - 'flowcharts/**'
      - 'notebooks/**'
      - '.gitignore'
      - 'runtime.txt'
      - 'LICENSE'

permissions:
  id-token: write
  contents: read

jobs:
  integration:
    name: Continuous Integration
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install uv
        uses: astral-sh/setup-uv@v4
        with:
          version: "latest"

      - name: Install project dependencies
        run: |
          uv pip install --system -r requirements.txt
          uv pip install --system -e .

      - name: Install dev dependencies
        run: |
          uv pip install --system pytest pytest-cov flake8 httpx

      - name: Lint — check for syntax errors and undefined names
        run: |
          flake8 sensor/ --count --select=E9,F63,F7,F82 --show-source --statistics

      - name: Lint — full style check (warnings only, non-blocking)
        run: |
          flake8 sensor/ --count --max-line-length=120 --statistics --exit-zero

      - name: Run unit tests with coverage
        run: |
          pytest tests/ -v --tb=short \
            --cov=sensor \
            --cov-report=term-missing \
            --cov-report=xml:coverage.xml
        env:
          MLFLOW_TRACKING_URI: ${{ secrets.MLFLOW_TRACKING_URI }}
          MLFLOW_TRACKING_USERNAME: ${{ secrets.MLFLOW_TRACKING_USERNAME }}
          MLFLOW_TRACKING_PASSWORD: ${{ secrets.DAGSHUB_USER_TOKEN }}

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage.xml
          retention-days: 7

  build-and-push-ecr-image:
    name: Continuous Delivery
    needs: integration
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Install Utilities
        run: |
          sudo apt-get update
          sudo apt-get install -y jq unzip
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v1
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v1

      - name: Build, tag, and push image to Amazon ECR
        id: build-image
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          ECR_REPOSITORY: ${{ secrets.ECR_REPOSITORY_NAME }}
          IMAGE_TAG: latest
        run: |
          # Build a docker container and
          # push it to ECR so that it can
          # be deployed to ECS.
          docker build -t $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG .
          docker push $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG
          echo "IMAGE=$ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG" >> $GITHUB_ENV
          
          
  Continuous-Deployment:
    needs: build-and-push-ecr-image
    runs-on: self-hosted
    steps:
      - name: Checkout
        uses: actions/checkout@v3

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v1
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v1

      - name: Start Docker
        run: sudo systemctl start docker

      
      - name: Pull latest images
        run: |
         docker pull ${{ steps.login-ecr.outputs.registry }}/${{ secrets.ECR_REPOSITORY_NAME }}:latest


      - name: Stop and remove sensor container if running or stopped
        run: |
          CONTAINER_ID=$(docker ps -aq --filter "name=aps-failure-classification")  # Check all containers (running or stopped)
          if [ -n "$CONTAINER_ID" ]; then
            echo "Stopping and removing container: aps-failure-classification"
            docker stop $CONTAINER_ID || true  
            docker rm -fv $CONTAINER_ID  
          else
            echo "No existing container found with name: aps-failure-classification"
          fi
      

      - name: Run Docker Image to serve users
        run: |
         SENSOR_CONTAINER_NAME="aps-failure-classification-$(date +%s)"
         docker run -d -p 80:8080 --name=$SENSOR_CONTAINER_NAME \
         -e 'MONGO_DB_URL=${{ secrets.MONGO_DB_URL }}' \
         -e 'AWS_ACCESS_KEY_ID=${{ secrets.AWS_ACCESS_KEY_ID }}' \
         -e 'AWS_SECRET_ACCESS_KEY=${{ secrets.AWS_SECRET_ACCESS_KEY }}' \
         -e 'AWS_REGION=${{ secrets.AWS_REGION }}' \
         -e 'MLFLOW_TRACKING_URI=${{ secrets.MLFLOW_TRACKING_URI }}' \
         -e 'MLFLOW_TRACKING_USERNAME=${{ secrets.MLFLOW_TRACKING_USERNAME }}' \
         -e 'MLFLOW_TRACKING_PASSWORD=${{ secrets.DAGSHUB_USER_TOKEN }}' \
         ${{ steps.login-ecr.outputs.registry }}/${{ secrets.ECR_REPOSITORY_NAME }}:latest

      - name: Clean previous images and containers
        run: |
         docker system prune -f
