# DVC Pipeline Definition
#
# NOTE: Artifact outputs use timestamp-based directories (artifact/<timestamp>/...)
# so DVC does not track them as `outs` — MLflow handles artifact versioning.
# DVC is used here for:
#   1. Raw data versioning  (dvc add on sensor.csv)
#   2. Parameter tracking   (params.yaml)
#   3. Metrics tracking     (metrics.json)
#   4. Pipeline reproducibility (dvc repro reruns stages when params change)

stages:

  data_ingestion:
    cmd: python -c "
        from sensor.entity.config_entity import TrainingPipelineConfig, DataIngestionConfig;
        from sensor.components.data_ingestion import DataIngestion;
        cfg = DataIngestionConfig(TrainingPipelineConfig());
        DataIngestion(cfg).initiate_data_ingestion()"
    deps:
      - sensor/components/data_ingestion.py
      - sensor/data_access/sensor_data.py
      - config/schema.yaml
    params:
      - data_ingestion.collection_name
      - data_ingestion.train_test_split_ratio

  data_validation:
    cmd: python main.py
    deps:
      - sensor/components/data_validation.py
      - config/schema.yaml
    params:
      - data_validation.drift_threshold

  data_transformation:
    cmd: python -c "print('Run via main.py training pipeline')"
    deps:
      - sensor/components/data_transformation.py

  model_trainer:
    cmd: python -c "print('Run via main.py training pipeline')"
    deps:
      - sensor/components/model_trainer.py
    params:
      - model_trainer.expected_accuracy
      - model_trainer.overfitting_threshold
      - model_trainer.n_estimators
      - model_trainer.max_depth
      - model_trainer.learning_rate
    metrics:
      - metrics.json:
          cache: false
